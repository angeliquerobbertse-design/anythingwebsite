<style>
  *{box-sizing:border-box;margin:0;padding:0;}
  html{scroll-behavior:smooth;}
  body{font-family:'Instrument Sans',sans-serif;background:#0D0D0D;color:#F5F2ED;-webkit-font-smoothing:antialiased;overflow-x:hidden;}
  ::-webkit-scrollbar{width:4px;}
  ::-webkit-scrollbar-track{background:#111;}
  ::-webkit-scrollbar-thumb{background:#3A3835;border-radius:2px;}
  .font-display{font-family:'Playfair Display',serif;}
  /* hero word cycle */
  .word-slot{display:inline-block;overflow:hidden;height:1.05em;vertical-align:bottom;min-width:2ch;}
  .word-enter{animation:word-in .4s ease both;}
  .word-exit {animation:word-out .4s ease both;}
  @keyframes word-in {from{opacity:0;transform:translateY(100%)}to{opacity:1;transform:translateY(0)}}
  @keyframes word-out{from{opacity:1;transform:translateY(0)}to{opacity:0;transform:translateY(-100%)}}
  /* reveal on scroll */
  .reveal{opacity:0;transform:translateY(22px);transition:opacity .65s ease,transform .65s ease;}
  .reveal.in{opacity:1;transform:none;}
  .d1{transition-delay:.08s;} .d2{transition-delay:.16s;} .d3{transition-delay:.24s;} .d4{transition-delay:.32s;}
  /* range input */
  input[type=range]{-webkit-appearance:none;appearance:none;height:4px;background:#1C1C1C;border-radius:2px;outline:none;cursor:pointer;}
  input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:18px;height:18px;border-radius:50%;background:#C8A96E;border:2px solid #0D0D0D;box-shadow:0 0 0 2px rgba(200,169,110,.3);}
  input[type=range].eat-range::-webkit-slider-thumb{background:#E8612A;box-shadow:0 0 0 2px rgba(232,97,42,.3);}
  /* cost bar */
  .cost-bar{height:3px;background:#1C1C1C;border-radius:2px;overflow:hidden;}
  .cost-bar-fill{height:100%;border-radius:2px;width:0;transition:width 1.4s cubic-bezier(.4,0,.2,1);}
  .ing-list-wrap{max-height:0;overflow:hidden;transition:max-height .4s ease;}
  .ing-list-wrap.open{max-height:600px;}
  /* product card hover reveals */
  .product-card .card-desc,.product-card .card-cta{opacity:0;transform:translateY(8px);transition:opacity .3s,transform .3s;}
  .product-card:hover .card-desc,.product-card:hover .card-cta{opacity:1;transform:translateY(0);}
  @media(max-width:767px){
    .product-card .card-desc,.product-card .card-cta{opacity:1;transform:none;}
  }
  .product-card .card-accent{transform:scaleX(0);transform-origin:left;transition:transform .4s ease;}
  .product-card:hover .card-accent{transform:scaleX(1);}
  /* take out 2-col grid */
  .rest-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
  @media(max-width:640px){.rest-grid{grid-template-columns:1fr;}}
  /* outfit image grid */
  .outfit-img-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
  /* quiz */
  .quiz-opt{padding:10px 14px;background:#1C1C1C;border:1px solid rgba(255,255,255,.1);border-radius:8px;font-size:13px;color:#F5F2ED;cursor:pointer;transition:border-color .15s,background .15s;font-family:'Instrument Sans',sans-serif;}
  .quiz-opt:hover{border-color:rgba(196,151,10,.5);background:rgba(196,151,10,.08);}
  .quiz-opt.correct{background:rgba(31,155,110,.15);border-color:#1F9B6E;color:#1F9B6E;pointer-events:none;}
  .quiz-opt.wrong{background:rgba(232,97,42,.15);border-color:#E8612A;color:#E8612A;pointer-events:none;}
  .quiz-opt.disabled{pointer-events:none;opacity:.6;}
  /* chip */
  .chip{padding:7px 14px;border-radius:99px;border:1px solid rgba(255,255,255,.12);background:transparent;font-size:13px;font-weight:500;color:#A09C96;cursor:pointer;transition:all .15s;white-space:nowrap;font-family:'Instrument Sans',sans-serif;}
  .chip:hover{border-color:rgba(255,255,255,.2);color:#F5F2ED;}
  .chip.on-eat{background:rgba(232,97,42,.12);border-color:#E8612A;color:#E8612A;font-weight:600;}
  .chip.on-wear{background:rgba(31,155,110,.12);border-color:#1F9B6E;color:#1F9B6E;font-weight:600;}
  .chip.on-watch{background:rgba(98,70,234,.12);border-color:#6246EA;color:#a99aff;font-weight:600;}
  .chip.on-do{background:rgba(196,151,10,.12);border-color:#C4970A;color:#C4970A;font-weight:600;}
  .chip.on-gold{background:rgba(200,169,110,.12);border-color:#C8A96E;color:#C8A96E;font-weight:600;}
  /* Lucide-like SVG icons inlined via CSS */
</style>

/* ═══ HELPERS ════════════════════════════════════════════════════════════════ */
function haversine(lat1,lon1,lat2,lon2){
  const R=6371,dL=(lat2-lat1)*Math.PI/180,dO=(lon2-lon1)*Math.PI/180;
  const a=Math.sin(dL/2)**2+Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dO/2)**2;
  return(R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a))).toFixed(1);
}
function decodeHTML(h){const t=document.createElement('textarea');t.innerHTML=h;return t.value;}
function randPick(arr){return arr[Math.floor(Math.random()*arr.length)];}

/* ═══ SCROLL REVEAL HOOK ══════════════════════════════════════════════════════ */
function useReveal(){
  const ref=useRef(null);
  useEffect(()=>{
    const el=ref.current;if(!el)return;
    const obs=new IntersectionObserver(([e])=>{if(e.isIntersecting){el.classList.add('in');obs.unobserve(el);}},{threshold:0.1});
    obs.observe(el);
    return()=>obs.disconnect();
  },[]);
  return ref;
}
function Reveal({children,delay='',className=''}){
  const ref=useReveal();
  return <div ref={ref} className={`reveal ${delay} ${className}`}>{children}</div>;
}

/* ═══ WORD CYCLE ══════════════════════════════════════════════════════════════ */
const CYCLE_WORDS=['deciding.','choosing.','wondering.','scrolling.'];
function WordCycle(){
  const [idx,setIdx]=useState(0);
  const [phase,setPhase]=useState('idle'); // idle | exit | enter
  const cur=CYCLE_WORDS[idx];
  useEffect(()=>{
    const t=setInterval(()=>{
      setPhase('exit');
      setTimeout(()=>{setIdx(i=>(i+1)%CYCLE_WORDS.length);setPhase('enter');},400);
      setTimeout(()=>setPhase('idle'),850);
    },2600);
    return()=>clearInterval(t);
  },[]);
  return(
    <span className="word-slot italic text-gold">
      <span className={phase==='exit'?'word-exit':phase==='enter'?'word-enter':''}>{cur}</span>
    </span>
  );
}

/* ═══ COUNTER ═════════════════════════════════════════════════════════════════ */
function Counter({target,suffix='',duration=1400,trigger}){
  const [val,setVal]=useState(0);
  useEffect(()=>{
    if(!trigger)return;
    const s=performance.now();
    function step(ts){
      const p=Math.min((ts-s)/duration,1);
      const e=1-Math.pow(1-p,3);
      setVal(Math.round(e*target));
      if(p<1)requestAnimationFrame(step);
    }
    requestAnimationFrame(step);
  },[trigger,target,duration]);
  return <>{val}{suffix}</>;
}

/* ── EAT PANE ── */
function EatPane({location,onChangeLocation}){
  const [view,setView]=useState('fork'); // fork | dine | takeout
  const [cuisine,setCuisine]=useState('');
  const [meal,setMeal]=useState('');
  const [fridgeItems,setFridgeItems]=useState([]);
  const [fridgeInput,setFridgeInput]=useState('');
  const [recipe,setRecipe]=useState(null);
  const [recipeLoading,setRecipeLoading]=useState(false);
  const [recipeError,setRecipeError]=useState(false);
  const [ingOpen,setIngOpen]=useState(false);
  const [restaurants,setRestaurants]=useState(null);
  const [restLoading,setRestLoading]=useState(false);
  const [radius,setRadius]=useState(5);
  const radTimerRef=useRef(null);

  const loadRecipe=useCallback(async(cuisineVal,mealVal)=>{
    setRecipeLoading(true);setRecipeError(false);setRecipe(null);setIngOpen(false);
    try{
      const cat=cuisineVal??cuisine;
      let url=cat
        ?`https://www.themealdb.com/api/json/v1/1/filter.php?c=${encodeURIComponent(cat)}`
        :`https://www.themealdb.com/api/json/v1/1/random.php`;
      const r=await fetch(url);const d=await r.json();
      const meals=d.meals||[];
      if(!meals.length)throw new Error('empty');
      let full;
      if(cat){
        const pick=meals[Math.floor(Math.random()*Math.min(meals.length,20))];
        const r2=await fetch(`https://www.themealdb.com/api/json/v1/1/lookup.php?i=${pick.idMeal}`);
        const d2=await r2.json();full=d2.meals?.[0];
      }else{full=meals[0];}
      if(!full)throw new Error('no full');
      setRecipe(full);
    }catch(e){setRecipeError(true);}
    setRecipeLoading(false);
  },[cuisine]);

  const loadTakeout=useCallback(async(r)=>{
    const rad=r??radius;
    setRestLoading(true);setRestaurants(null);
    const{lat,lon}=location;
    const radiusM=rad*1000;
    const q=`[out:json][timeout:15];(node["amenity"="restaurant"](around:${radiusM},${lat},${lon});node["amenity"="fast_food"](around:${radiusM},${lat},${lon}););out body 10;`;
    try{
      const res=await fetch('https://overpass-api.de/api/interpreter',{method:'POST',body:'data='+encodeURIComponent(q),headers:{'Content-Type':'application/x-www-form-urlencoded'}});
      const data=await res.json();
      const places=(data.elements||[]).filter(p=>p.tags?.name).slice(0,6);
      if(places.length){
        setRestaurants(places.map((p,i)=>({
          name:p.tags.name,
          cuisine:p.tags.cuisine||'Restaurant',
          addr:p.tags['addr:street']||location.label,
          dist:haversine(lat,lon,p.lat||lat,p.lon||lon),
          delivery:p.tags.delivery==='yes',
          phone:p.tags.phone,
          lat:p.lat||lat,lon:p.lon||lon,
          img:REST_IMGS[i%REST_IMGS.length],
        })));
      }else throw new Error('empty');
    }catch(e){
      setRestaurants(DEMO_RESTAURANTS.map((d,i)=>({...d,img:REST_IMGS[i%REST_IMGS.length],lat:location.lat+((i%3)*.01),lon:location.lon+((i%3)*.01)})));
    }
    setRestLoading(false);
  },[location,radius]);

  const goView=v=>{
    setView(v);
    if(v==='dine'&&!recipe&&!recipeLoading)loadRecipe('','');
    if(v==='takeout')loadTakeout(radius);
  };

  const addIngredient=()=>{
    const v=fridgeInput.trim().toLowerCase();
    if(!v||fridgeItems.includes(v))return;
    setFridgeItems(i=>[...i,v]);setFridgeInput('');
  };
  const searchFridge=async()=>{
    setRecipeLoading(true);setRecipeError(false);setRecipe(null);
    const mealSets=[];
    for(const ing of fridgeItems.slice(0,3)){
      try{const r=await fetch(`https://www.themealdb.com/api/json/v1/1/filter.php?i=${encodeURIComponent(ing)}`);const d=await r.json();if(d.meals)mealSets.push(...d.meals.slice(0,5));}catch(e){}
    }
    const seen=new Set();const unique=mealSets.filter(m=>{if(seen.has(m.idMeal))return false;seen.add(m.idMeal);return true;});
    if(!unique.length){setRecipeError(true);setRecipeLoading(false);return;}
    try{const r=await fetch(`https://www.themealdb.com/api/json/v1/1/lookup.php?i=${unique[0].idMeal}`);const d=await r.json();setRecipe(d.meals?.[0]||null);}catch(e){setRecipeError(true);}
    setRecipeLoading(false);
  };

  const ings=useMemo(()=>{
    if(!recipe)return[];
    const r=[];for(let i=1;i<=20;i++){const n=recipe[`strIngredient${i}`]?.trim(),v=recipe[`strMeasure${i}`]?.trim();if(n)r.push({name:n,measure:v||''});}
    return r;
  },[recipe]);

  const cuisines=['','Chicken','Beef','Vegetarian','Seafood','Pasta','Lamb','Dessert'];
  const meals=['','Breakfast','Lunch','Supper','Snacks'];

  if(view==='fork') return(
    <div>
      <div className="text-xs font-semibold tracking-widest uppercase text-eat mb-2 flex items-center gap-2"><Icon name="utensils" size={12}/>Anything Eat</div>
      <div className="font-display font-bold text-ink text-2xl md:text-3xl mb-6 leading-tight">How are you eating tonight?</div>
      <div className="grid grid-cols-1 sm:grid-cols-2 gap-4 mb-2">
        {[{id:'dine',img:'https://images.unsplash.com/photo-1466637574441-749b8f19452f?w=600&q=80',title:'Dine In',sub:'Cook at home · recipe ideas'},
          {id:'takeout',img:'https://images.unsplash.com/photo-1565299624946-b28f40a0ae38?w=600&q=80',title:'Takeout',sub:'Restaurants near you'}
        ].map(c=>(
          <div key={c.id} onClick={()=>goView(c.id)} className="relative rounded-2xl overflow-hidden cursor-pointer h-44 group border-2 border-transparent hover:border-eat transition-colors">
            <img src={c.img} alt={c.title} className="w-full h-full object-cover transition-transform duration-300 group-hover:scale-105"/>
            <div className="absolute inset-0" style={{background:'linear-gradient(to top,rgba(0,0,0,.8),rgba(0,0,0,.1))'}}/>
            <div className="absolute bottom-0 left-0 p-4">
              <div className="font-display font-bold text-white text-xl">{c.title}</div>
              <div className="text-white/60 text-xs mt-0.5">{c.sub}</div>
            </div>
          </div>
        ))}
      </div>
    </div>
  );

  if(view==='dine') return(
    <div>
      <div className="flex items-center gap-3 mb-5">
        <button onClick={()=>setView('fork')} className="flex items-center gap-1 px-3 py-1.5 text-xs font-medium text-ink2 border border-white/10 rounded-lg hover:bg-card2 transition-colors"><Icon name="chevronl" size={14}/>Back</button>
        <div className="font-display font-semibold text-ink text-xl">Dine In</div>
      </div>

      <div className="mb-4">
        <div className="text-[10px] font-semibold tracking-wider uppercase text-ink3 mb-2">Cuisine</div>
        <div className="flex flex-wrap gap-2">
          {cuisines.map(c=>(
            <Chip key={c} label={c||'Any'} active={cuisine===c} colorClass="on-eat"
              onClick={()=>{setCuisine(c);loadRecipe(c,meal);}}/>
          ))}
        </div>
      </div>
      <div className="mb-4">
        <div className="text-[10px] font-semibold tracking-wider uppercase text-ink3 mb-2">Meal Type</div>
        <div className="flex flex-wrap gap-2">
          {meals.map(m=>(
            <Chip key={m} label={m||'Any'} active={meal===m} colorClass="on-eat"
              onClick={()=>{setMeal(m);loadRecipe(cuisine,m);}}/>
          ))}
        </div>
      </div>

      <div className="bg-card2 border border-white/10 rounded-xl p-4 mb-4">
        <div className="text-[10px] font-semibold tracking-wider uppercase text-ink3 mb-3 flex items-center gap-2"><Icon name="search" size={11}/>What's in your fridge?</div>
        <div className="flex gap-2">
          <input value={fridgeInput} onChange={e=>setFridgeInput(e.target.value)} onKeyDown={e=>e.key==='Enter'&&addIngredient()}
            placeholder="e.g. chicken, butternut…" className="flex-1 bg-card border border-white/10 rounded-lg px-3 py-2 text-sm text-ink placeholder-ink3 outline-none focus:border-eat transition-colors" style={{fontSize:16}}/>
          <button onClick={addIngredient} className="px-3 py-2 bg-eat text-white rounded-lg text-sm font-semibold hover:opacity-90 transition-opacity flex items-center gap-1"><Icon name="plus" size={14}/>Add</button>
        </div>
        {fridgeItems.length>0&&(
          <div className="mt-2 flex flex-wrap gap-1.5">
            {fridgeItems.map(item=>(
              <span key={item} className="inline-flex items-center gap-1.5 px-2.5 py-1 bg-eat/10 border border-eat/30 rounded-full text-xs text-eat">
                {item}<button onClick={()=>setFridgeItems(i=>i.filter(x=>x!==item))} className="opacity-60 hover:opacity-100"><Icon name="x" size={10}/></button>
              </span>
            ))}
            <button onClick={searchFridge} className="px-3 py-1 text-xs font-semibold text-eat border border-eat/40 rounded-full hover:bg-eat/10 transition-colors ml-1">Search with these →</button>
          </div>
        )}
      </div>

      {recipeLoading&&<Loading color="#E8612A"/>}
      {recipeError&&!recipeLoading&&(
        <div className="text-center py-8 text-ink2 text-sm">
          Could not load a recipe. <button onClick={()=>loadRecipe(cuisine,meal)} className="text-eat font-semibold">Retry →</button>
        </div>
      )}
      {recipe&&!recipeLoading&&(
        <div>
          <div className="bg-card2 border border-white/10 rounded-2xl overflow-hidden mb-3">
            <img src={recipe.strMealThumb} alt={recipe.strMeal} className="w-full h-48 object-cover" loading="lazy"/>
            <div className="p-4">
              <div className="text-[10px] font-semibold tracking-wider uppercase text-eat mb-1">{recipe.strArea||'International'}</div>
              <div className="font-display font-bold text-ink text-xl mb-2 leading-snug">{recipe.strMeal}</div>
              <div className="flex flex-wrap gap-1.5 mb-3">
                <span className="px-2 py-0.5 bg-eat/10 border border-eat/20 rounded-full text-xs text-eat">{recipe.strCategory}</span>
                {recipe.strTags&&recipe.strTags.split(',').slice(0,2).map(t=>t.trim()).filter(Boolean).map(t=>(
                  <span key={t} className="px-2 py-0.5 bg-eat/10 border border-eat/20 rounded-full text-xs text-eat">{t}</span>
                ))}
              </div>
              <p className="text-sm text-ink2 leading-relaxed mb-3">{recipe.strInstructions||''}</p>
              <button onClick={()=>setIngOpen(o=>!o)} className="text-xs font-semibold text-gold flex items-center gap-1">
                <Icon name={ingOpen?'chevronup':'chevrondown'} size={13}/>
                {ingOpen?'Hide':'Show'} ingredients ({ings.length})
              </button>
              <div className={`ing-list-wrap ${ingOpen?'open':''}`}>
                <div className="mt-3 flex flex-col gap-0">
                  {ings.slice(0,12).map((ing,i)=>(
                    <div key={i} className="grid py-1.5 border-b border-white/[.05] text-sm" style={{gridTemplateColumns:'8px 1fr auto',gap:'10px',alignItems:'center'}}>
                      <div className="w-1.5 h-1.5 rounded-full bg-eat justify-self-center"/>
                      <div className="text-ink">{ing.name}</div>
                      <div className="text-ink3 text-xs">{ing.measure}</div>
                    </div>
                  ))}
                </div>
              </div>
            </div>
          </div>
          <div className="flex flex-col gap-2">
            {recipe.strYoutube
              ?<a href={recipe.strYoutube} target="_blank" rel="noreferrer" className="flex items-center justify-center gap-2 py-3 bg-eat text-white font-semibold rounded-xl text-sm hover:opacity-90 transition-opacity"><Icon name="play" size={14}/>Watch on YouTube</a>
              :<button onClick={()=>loadRecipe(cuisine,meal)} className="py-3 bg-eat text-white font-semibold rounded-xl text-sm hover:opacity-90 transition-opacity">View Full Recipe</button>
            }
            <button onClick={()=>loadRecipe(cuisine,meal)} className="py-3 border border-white/15 text-ink2 font-medium rounded-xl text-sm hover:bg-card2 hover:border-white/25 transition-all flex items-center justify-center gap-2">
              <Icon name="refresh" size={14}/>Try another
            </button>
          </div>
          <div className="text-center text-[10px] text-ink4 mt-3">TheMealDB · Free API</div>
        </div>
      )}
    </div>
  );

  // takeout
  return(
    <div>
      <div className="flex items-center gap-3 mb-5">
        <button onClick={()=>setView('fork')} className="flex items-center gap-1 px-3 py-1.5 text-xs font-medium text-ink2 border border-white/10 rounded-lg hover:bg-card2 transition-colors"><Icon name="chevronl" size={14}/>Back</button>
        <div className="font-display font-semibold text-ink text-xl">Takeout Near You</div>
      </div>
      <button onClick={onChangeLocation} className="w-full flex items-center gap-2 px-4 py-2.5 bg-card2 border border-white/10 rounded-xl text-sm text-ink2 hover:border-gold/40 transition-colors mb-4">
        <Icon name="mappin" size={14} cls="text-gold"/><span className="flex-1 text-left">{location.label} — {location.sub}</span><span className="text-xs font-semibold text-gold">Change</span>
      </button>
      <div className="flex items-center gap-3 mb-5">
        <span className="text-[10px] font-semibold tracking-wider uppercase text-ink3 whitespace-nowrap">Radius</span>
        <input type="range" className="flex-1 eat-range" min={1} max={20} value={radius} onChange={e=>{const v=parseInt(e.target.value);setRadius(v);clearTimeout(radTimerRef.current);radTimerRef.current=setTimeout(()=>loadTakeout(v),600);}}/>
        <span className="text-xs font-semibold text-eat min-w-[40px] text-right">{radius} km</span>
      </div>
      {restLoading&&<Loading color="#E8612A"/>}
      {restaurants&&!restLoading&&(
        <div className="rest-grid">
          {restaurants.map((r,i)=>(
            <div key={i} className="bg-card2 border border-white/[.07] rounded-2xl overflow-hidden">
              <img src={r.img} alt={r.name} className="w-full h-28 object-cover" loading="lazy"/>
              <div className="p-3">
                <div className="font-display font-semibold text-ink text-sm mb-2 leading-tight">{r.name}</div>
                <div className="flex flex-wrap gap-1 mb-2">
                  {String(r.cuisine).split('/').map(c=><span key={c} className="px-2 py-0.5 bg-eat/10 text-eat rounded-full text-[10px] font-medium">{c.trim()}</span>)}
                  <span className="px-2 py-0.5 bg-white/5 text-ink3 rounded-full text-[10px] border border-white/[.07]">{r.dist} km</span>
                  {r.delivery&&<span className="px-2 py-0.5 bg-wear/10 text-wear rounded-full text-[10px] font-medium">Delivery</span>}
                </div>
                <div className="text-xs text-ink3 mb-3 flex items-center gap-1"><Icon name="mappin" size={10}/>{r.addr}</div>
                <div className="flex gap-2">
                  <button onClick={()=>window.open(`https://www.google.com/maps/search/?api=1&query=${r.lat},${r.lon}`,`_blank`)} className="flex-1 py-2 bg-eat text-white rounded-lg text-xs font-semibold flex items-center justify-center gap-1 hover:opacity-90">
                    <Icon name="mappin" size={12}/>Directions
                  </button>
                  {r.phone
                    ?<button onClick={()=>window.open(`tel:${r.phone}`)} className="flex-1 py-2 bg-card border border-white/10 text-ink2 rounded-lg text-xs font-semibold flex items-center justify-center gap-1 hover:bg-card2">
                      <Icon name="globe" size={12}/>Call
                     </button>
                    :<button className="flex-1 py-2 bg-card border border-white/10 text-ink3 rounded-lg text-xs font-semibold flex items-center justify-center gap-1 opacity-50 cursor-default">
                      <Icon name="globe" size={12}/>Call
                     </button>
                  }
                </div>
              </div>
            </div>
          ))}
        </div>
      )}
      <div className="text-center text-[10px] text-ink4 mt-4">OpenStreetMap · live data · {radius}km radius</div>
    </div>
  );
}

/* ── WEAR PANE ── */
function WearPane({location,onChangeLocation}){
  const [weather,setWeather]=useState(null);
  const [loading,setLoading]=useState(false);
  const [gender,setGender]=useState('any');
  const [occasion,setOccasion]=useState('any');

  const load=useCallback(async()=>{
    setLoading(true);
    try{
      const{lat,lon}=location;
      const r=await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current=temperature_2m,apparent_temperature,weather_code,wind_speed_10m&wind_speed_unit=kmh`);
      const d=await r.json();const c=d.current;
      setWeather({temp:Math.round(c.temperature_2m),feels:Math.round(c.apparent_temperature),wind:Math.round(c.wind_speed_10m),code:c.weather_code});
    }catch(e){setWeather({temp:22,feels:20,wind:15,code:0});}
    setLoading(false);
  },[location]);

  useEffect(()=>{load();},[load]);

  const wKey=useMemo(()=>{
    if(!weather)return 'mild';
    const{temp,code}=weather;
    if(temp<12)return 'cold';
    if(code>=51&&code<=82)return 'rain';
    if(temp>=28)return 'hot';
    return 'mild';
  },[weather]);

  const desc=useMemo(()=>{
    if(!weather)return '';
    const c=weather.code;
    return c===0?'Clear sky':c<=3?'Partly cloudy':c<=48?'Foggy':c<=67?'Rainy':c<=82?'Showers':'Overcast';
  },[weather]);

  const outfit=useMemo(()=>{
    const gKey=gender==='any'?'neutral':gender;
    const oKey=occasion==='any'?'any':occasion;
    const d=OUTFIT_DATA[wKey];
    const imgs=(d?.images?.[gKey]?.[oKey]||d?.images?.[gKey]?.any||d?.images?.neutral?.any||[]);
    const items=(d?.items?.[gKey]?.[oKey]||d?.items?.[gKey]?.any||d?.items?.neutral?.any||[]);
    return{imgs,items};
  },[wKey,gender,occasion]);

  const wLabel={cold:'Cold',rain:'Rainy',hot:'Hot',mild:'Mild'}[wKey]||'';
  const oLabel={any:'',casual:' · Casual',work:' · Work',formal:' · Formal',sport:' · Sport',beach:' · Beach'}[occasion]||'';
  const gLabel={any:'',men:' for Men',women:' for Women',neutral:' Unisex'}[gender]||'';

  return(
    <div>
      <div className="text-xs font-semibold tracking-widest uppercase text-wear mb-2 flex items-center gap-2"><Icon name="shirt" size={12}/>Anything Wear</div>
      <div className="font-display font-bold text-ink text-2xl md:text-3xl mb-5 leading-tight">What to wear today.</div>

      {loading&&<Loading color="#1F9B6E"/>}
      {weather&&!loading&&(
        <>
          {/* weather card */}
          <div className="flex items-center gap-4 bg-card2 border border-white/[.08] rounded-2xl p-4 mb-5">
            <div className="font-display font-bold text-wear leading-none" style={{fontSize:'3rem'}}>{weather.temp}°</div>
            <div className="flex-1">
              <div className="font-semibold text-ink text-sm">{desc}</div>
              <div className="text-xs text-ink2 mt-0.5">Feels {weather.feels}°C · Wind {weather.wind} km/h</div>
              <div className="text-[10px] text-ink3 mt-1 flex items-center gap-1 cursor-pointer hover:text-gold transition-colors" onClick={onChangeLocation}><Icon name="globe" size={10}/>Open-Meteo · {location.label} <span className="text-gold font-semibold ml-1">Change city →</span></div>
            </div>
            <button onClick={load} className="p-2 text-ink3 hover:text-wear transition-colors rounded-lg hover:bg-card"><Icon name="refresh" size={16}/></button>
          </div>

          {/* filters */}
          <div className="mb-4">
            <div className="text-[10px] font-semibold tracking-wider uppercase text-ink3 mb-2 flex items-center gap-1.5"><Icon name="users" size={11}/>Gender</div>
            <div className="flex flex-wrap gap-2">
              {[['any','Any'],['men','Men'],['women','Women'],['neutral','Unisex']].map(([v,l])=>(
                <Chip key={v} label={l} active={gender===v} colorClass="on-wear" onClick={()=>setGender(v)}/>
              ))}
            </div>
          </div>
          <div className="mb-5">
            <div className="text-[10px] font-semibold tracking-wider uppercase text-ink3 mb-2 flex items-center gap-1.5"><Icon name="calendar" size={11}/>Occasion</div>
            <div className="flex flex-wrap gap-2">
              {[['any','Any'],['casual','Casual'],['work','Work'],['formal','Formal'],['sport','Sport'],['beach','Beach']].map(([v,l])=>(
                <Chip key={v} label={l} active={occasion===v} colorClass="on-wear" onClick={()=>setOccasion(v)}/>
              ))}
            </div>
          </div>

          {/* outfit heading */}
          <div className="font-display font-semibold text-ink text-base mb-3">{wLabel}{oLabel}{gLabel} Outfit Inspiration</div>

          {/* outfit images — always visible */}
          {outfit.imgs.length>0&&(
            <div className="outfit-img-grid mb-4">
              {outfit.imgs.slice(0,2).map((src,i)=>(
                <div key={i} className={`relative rounded-2xl overflow-hidden ${i===0?'row-span-1':''}`} style={{height:i===0?240:140}}>
                  <img src={src} alt={`Outfit ${i+1}`} className="w-full h-full object-cover" loading="lazy"/>
                  <div className="absolute inset-0" style={{background:'linear-gradient(to top,rgba(0,0,0,.6) 0%,transparent 55%)'}}/>
                  <div className="absolute bottom-2 left-3 right-3">
                    <span className="text-[11px] font-medium text-white/90">{i===0?`${wLabel}${oLabel}${gLabel}`:gender==='any'?'Alternative look':gender==='men'?'Men\'s option':'Women\'s option'}</span>
                  </div>
                </div>
              ))}
            </div>
          )}

          {/* item list */}
          <div className="bg-card2 border border-white/[.08] rounded-xl p-4 mb-4">
            <div className="text-[10px] font-semibold tracking-wider uppercase text-ink3 mb-3 flex items-center gap-1.5">
              <Icon name="check" size={11}/>{weather.temp}°C · {desc} — Recommended items
            </div>
            <div className="flex flex-col gap-2">
              {outfit.items.map((item,i)=>(
                <div key={i} className="flex items-center gap-3">
                  <div className="w-1.5 h-1.5 rounded-full bg-wear flex-shrink-0"/>
                  <span className="text-sm text-ink">{item}</span>
                </div>
              ))}
            </div>
          </div>

          {/* retailers */}
          <div className="bg-card2 border border-white/[.08] rounded-xl p-4">
            <div className="text-[10px] font-semibold tracking-wider uppercase text-ink3 mb-3 flex items-center gap-1.5"><Icon name="shopping" size={11}/>Where to buy</div>
            <div className="grid grid-cols-2 sm:grid-cols-3 gap-2">
              {RETAILERS.map(r=>(
                <button key={r.name} onClick={()=>window.open(r.url,'_blank')} className="py-2 px-3 bg-card border border-white/10 rounded-lg text-xs font-semibold text-ink hover:border-gold/40 hover:text-gold transition-all text-center">{r.name}</button>
              ))}
            </div>
          </div>
          <div className="text-center text-[10px] text-ink4 mt-3">Weather via Open-Meteo · Images via Unsplash</div>
        </>
      )}
    </div>
  );
}

/* ── WATCH PANE ── */
function WatchPane(){
  const [platform,setPlatform]=useState('');
  const [type,setType]=useState('');
  const [genre,setGenre]=useState('');

  const filtered=useMemo(()=>{
    let f=CURATED_TITLES;
    if(platform)f=f.filter(t=>t.platforms.includes(platform));
    if(genre)f=f.filter(t=>t.genres.includes(genre));
    if(type==='movie')f=f.filter(t=>!t.series);
    if(type==='tv')f=f.filter(t=>t.series);

    <div>

      <div className="mb-4">
        <div className="text-[10px] font-semibold tracking-wider uppercase text-ink3 mb-2">Platform</div>
        <div className="flex flex-wrap gap-2">
          {[['','All'],['netflix','Netflix'],['amazon','Prime'],['disney','Disney+'],['apple','Apple TV+']].map(([v,l])=>(
            <Chip key={v} label={l} active={platform===v} colorClass="on-watch" onClick={()=>setPlatform(v)}/>

      <div className="mb-4">
        <div className="text-[10px] font-semibold tracking-wider uppercase text-ink3 mb-2">Type</div>

          {[['','All'],['movie','Movies'],['tv','Series']].map(([v,l])=>(
            <Chip key={v} label={l} active={type===v} colorClass="on-watch" onClick={()=>setType(v)}/>
          ))}
        </div>
      </div>
      <div className="mb-5">
        <div className="text-[10px] font-semibold tracking-wider uppercase text-ink3 mb-2">Genre</div>

          {[['','All'],['28','Action'],['35','Comedy'],['18','Drama'],['27','Horror'],['878','Sci-Fi'],['10749','Romance'],['99','Documentary']].map(([v,l])=>(

          ))}
        </div>
      </div>

      <div className="flex flex-col gap-2.5">

          <div key={t.title} className="flex gap-3 bg-card2 border border-white/[.07] rounded-xl p-3">

              <div className="font-display font-semibold text-ink text-sm leading-snug mb-1.5">{t.title}</div>
              <div className="flex flex-wrap gap-1 mb-1.5">
                <span className="px-2 py-0.5 bg-watch/10 text-[#a99aff] rounded-full text-[10px] font-medium">{t.series?'Series':'Movie'}</span>
                {t.platforms.slice(0,2).map(p=><span key={p} className="px-2 py-0.5 bg-watch/10 text-[#a99aff] rounded-full text-[10px]">{PL_LABELS[p]||p}</span>)}
              </div>
              <div className="text-[11px] text-ink3 mb-1.5">{t.year}</div>
              <p className="text-xs text-ink2 leading-relaxed line-clamp-2 mb-2">{t.desc}</p>
              <div className="flex flex-wrap gap-1.5">
                {t.platforms.map(p=>(
                  <a key={p} href={(STREAM_URLS[p]||'https://www.google.com/search?q=')+encodeURIComponent(t.title)} target="_blank" rel="noreferrer"

                    <Icon name="play" size={9}/>Watch on {PL_LABELS[p]||p}

              </div>
            </div>
          </div>
        ))}
      </div>
      <div className="text-center text-[10px] text-ink4 mt-4">Curated 2024 titles · Add a TMDB key for live results</div>
    </div>
  );
}

/* ── DO PANE ── */
function DoPane({location,onChangeLocation}){
  const [doMode,setDoMode]=useState('activity'); // activity | bored
  const [category,setCategory]=useState('');
  const [city,setCity]=useState('cape-town');
  const [activity,setActivity]=useState(null);
  const [actImg,setActImg]=useState('');
  const [boredType,setBoredType]=useState('quiz');
  const [boredContent,setBoredContent]=useState(null);
  const [boredLoading,setBoredLoading]=useState(false);
  const [quizAnswered,setQuizAnswered]=useState(null);

  const pickActivity=useCallback((cat,c)=>{
    const loc=c||city;
    const data=ACTS[loc]||ACTS['cape-town'];
    const acts=(cat||category)?(data[(cat||category)]||data.any):data.any;
    const pick=randPick(acts);
    setActivity(pick);
    setActImg(randPick(ACT_IMGS));
  },[city,category]);

  useEffect(()=>{pickActivity('','cape-town');},[]);

  const loadBored=useCallback(async(type)=>{
    const t=type||boredType;
    setBoredLoading(true);setBoredContent(null);setQuizAnswered(null);
    try{
      if(t==='fact'){
        const f=randPick(FACTS);const isSA=FACTS.indexOf(f)<12;
        setBoredContent({type:'fact',isSA,text:f});setBoredLoading(false);return;
      }
      if(t==='joke'){
        const r=await fetch('https://v2.jokeapi.dev/joke/Any?blacklistFlags=nsfw,racist,sexist,political,explicit&type=single&safe-mode');
        const d=await r.json();
        if(!d.error&&d.joke){setBoredContent({type:'joke',text:d.joke});setBoredLoading(false);return;}
        throw new Error('no joke');
      }
      if(t==='quiz'){
        const r=await fetch('https://opentdb.com/api.php?amount=1&type=multiple&category=9');
        const d=await r.json();
        if(d.response_code===0&&d.results.length){
          const q=d.results[0];
          const opts=[...q.incorrect_answers,q.correct_answer].sort(()=>Math.random()-.5).map(o=>decodeHTML(o));
          setBoredContent({type:'quiz',question:decodeHTML(q.question),opts,correct:decodeHTML(q.correct_answer),category:q.category,difficulty:q.difficulty});
          setBoredLoading(false);return;
        }
        throw new Error('no quiz');
      }
    }catch(e){
      if(t==='joke'){const jokes=["Why do scientists rarely tell jokes? Because they always fall flat.","What do you call a bear with no teeth? A gummy bear.","Why can't you trust an atom? Because they make up everything.","Why did the scarecrow win an award? He was outstanding in his field."];setBoredContent({type:'joke',text:randPick(jokes)});}
      else if(t==='quiz'){const q=randPick(FALLBACK_QUIZZES);const opts=[...q.opts].sort(()=>Math.random()-.5);setBoredContent({type:'quiz',question:q.q,opts,correct:q.a,category:'South Africa',difficulty:'medium'});}
      else{const f=randPick(FACTS);setBoredContent({type:'fact',isSA:true,text:f});}
    }
    setBoredLoading(false);
  },[boredType]);

  const cityNames={'cape-town':'Cape Town',johannesburg:'Johannesburg',durban:'Durban',pretoria:'Pretoria',pe:'Gqeberha'};
  const catNames={'':'Any',outdoor:'Outdoor',arts:'Arts & Culture',food:'Food & Drink',wellness:'Wellness',social:'Social'};

  return(
    <div>
      <div className="text-xs font-semibold tracking-widest uppercase text-do mb-2 flex items-center gap-2"><Icon name="compass" size={12}/>Anything Do</div>
      <div className="font-display font-bold text-ink text-2xl md:text-3xl mb-4 leading-tight">What to do today.</div>

      {/* mode tabs */}
      <div className="flex bg-card2 border border-white/10 rounded-full p-1 mb-5 gap-1">
        {[['activity','Activities'],['bored','I\'m Bored']].map(([v,l])=>(
          <button key={v} onClick={()=>{setDoMode(v);if(v==='bored'&&!boredContent)loadBored(boredType);}} className={`flex-1 py-2.5 text-sm font-medium rounded-full transition-all ${doMode===v?'bg-do/15 text-do font-semibold':'text-ink3 hover:text-ink'}`}>{l}</button>
        ))}
      </div>

      {doMode==='activity'&&(
        <>
          <div className="mb-4">
            <div className="text-[10px] font-semibold tracking-wider uppercase text-ink3 mb-2">Category</div>
            <div className="flex flex-wrap gap-2">
              {[['','Any'],['outdoor','Outdoor'],['arts','Arts'],['food','Food'],['wellness','Wellness'],['social','Social']].map(([v,l])=>(
                <Chip key={v} label={l} active={category===v} colorClass="on-do" onClick={()=>{setCategory(v);pickActivity(v,city);}}/>
              ))}
            </div>
          </div>
          <div className="mb-5">
            <div className="text-[10px] font-semibold tracking-wider uppercase text-ink3 mb-2">City</div>
            <div className="flex flex-wrap gap-2">
              {[['cape-town','Cape Town'],['johannesburg','Joburg'],['durban','Durban'],['pretoria','Pretoria'],['pe','Gqeberha']].map(([v,l])=>(
                <Chip key={v} label={l} active={city===v} colorClass="on-do" onClick={()=>{setCity(v);pickActivity(category,v);}}/>
              ))}
            </div>
          </div>
          {activity&&(
            <div>
              <div className="bg-card2 border border-white/[.07] rounded-2xl overflow-hidden mb-3">
                <img src={actImg} alt="Activity" className="w-full h-44 object-cover" loading="lazy"/>
                <div className="p-4">
                  <div className="font-display font-bold text-ink text-xl leading-snug mb-3">{activity}</div>
                  <div className="flex flex-wrap gap-1.5">
                    <span className="px-2.5 py-1 bg-do/10 border border-do/25 rounded-full text-xs text-do flex items-center gap-1"><Icon name="mappin" size={10}/>{cityNames[city]||'Cape Town'}</span>
                    <span className="px-2.5 py-1 bg-do/10 border border-do/25 rounded-full text-xs text-do">{catNames[category]||'Any'}</span>
                  </div>
                </div>
              </div>
              <div className="flex flex-col gap-2">
                <button onClick={()=>window.open(`https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(activity+' '+(cityNames[city]||'Cape Town'))}`,'_blank')}
                  className="py-3 bg-do text-bg font-semibold rounded-xl text-sm flex items-center justify-center gap-2 hover:opacity-90 transition-opacity">
                  <Icon name="mappin" size={14}/>Find on Map
                </button>
                <button onClick={()=>pickActivity(category,city)} className="py-3 border border-white/15 text-ink2 font-medium rounded-xl text-sm flex items-center justify-center gap-2 hover:bg-card2 hover:border-white/25 transition-all">
                  <Icon name="refresh" size={14}/>Another Idea
                </button>
              </div>
              <div className="text-center text-[10px] text-ink4 mt-3">Curated activities · {cityNames[city]||'Cape Town'}</div>
            </div>
          )}
        </>
      )}

      {doMode==='bored'&&(
        <div>
          <div className="flex flex-wrap gap-2 mb-5">
            {[['quiz','Quiz'],['joke','Joke'],['fact','Fact']].map(([v,l])=>(
              <Chip key={v} label={l} active={boredType===v} colorClass="on-do" onClick={()=>{setBoredType(v);loadBored(v);}}/>
            ))}
          </div>
          {boredLoading&&<Loading color="#C4970A"/>}
          {boredContent&&!boredLoading&&(
            <div>
              <div className="bg-card2 border border-white/[.07] rounded-2xl p-5 mb-3">
                <div className="text-[10px] font-semibold tracking-wider uppercase text-do mb-3">
                  {boredContent.type==='fact'?(boredContent.isSA?'🇿🇦 South African Fact':'🌍 Did You Know?')
                  :boredContent.type==='joke'?'Joke'
                  :`${boredContent.category} · ${boredContent.difficulty}`}
                </div>
                <div className="font-display font-semibold text-ink text-lg leading-snug">
                  {boredContent.type==='quiz'?boredContent.question:boredContent.text}
                </div>
                {boredContent.type==='quiz'&&(
                  <div className="mt-4 flex flex-col gap-2">
                    {boredContent.opts.map(opt=>(
                      <button key={opt} disabled={!!quizAnswered}
                        onClick={()=>setQuizAnswered(opt)}
                        className={`quiz-opt text-left ${quizAnswered?(opt===boredContent.correct?'correct':opt===quizAnswered&&opt!==boredContent.correct?'wrong':'disabled'):''}`}>
                        {opt}
                      </button>
                    ))}
                    {quizAnswered&&(
                      <div className={`text-sm font-semibold mt-1 ${quizAnswered===boredContent.correct?'text-wear':'text-eat'}`}>
                        {quizAnswered===boredContent.correct?'Correct! ✓':'Not quite — the answer is: '+boredContent.correct}
                      </div>
                    )}
                  </div>
                )}
              </div>
              <button onClick={()=>loadBored(boredType)} className="w-full py-3 border border-white/15 text-ink2 font-medium rounded-xl text-sm flex items-center justify-center gap-2 hover:bg-card2 hover:border-white/25 transition-all">
                <Icon name="refresh" size={14}/>
                {boredContent.type==='quiz'?'Next Question':boredContent.type==='joke'?'Another Joke':'Another Fact'}
              </button>
              <div className="text-center text-[10px] text-ink4 mt-3">
                {boredContent.type==='quiz'?'Open Trivia DB':boredContent.type==='joke'?'JokeAPI · Safe mode':'Curated facts'}
              </div>
            </div>
          )}
        </div>
      )}
    </div>
  );
}

/* ═══ LOCATION MODAL ════════════════════════════════════════════════════════════ */

  return(
    <div className="fixed inset-0 z-50 bg-black/85 flex items-end justify-center" onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div className="w-full max-w-lg bg-[#1A1A1A] rounded-t-3xl p-6 border-t border-white/10 max-h-[70vh] overflow-y-auto">
        <div className="font-display font-bold text-ink text-xl mb-5 flex items-center gap-2"><Icon name="mappin" size={18} cls="text-gold"/>Choose Your City</div>
        <div className="flex flex-col gap-2">
          {LOCATIONS.map(l=>(
            <button key={l.id} onClick={()=>onSelect(l)}
              className={`flex items-center gap-3 p-3.5 rounded-xl text-left border transition-all ${currentLocation.id===l.id?'border-gold bg-gold/10':'border-white/[.07] bg-card2 hover:border-white/20'}`}>
              <Icon name="globe" size={16} cls={currentLocation.id===l.id?'text-gold':'text-ink3'}/>

  );
}

/* ═══ APP ═══════════════════════════════════════════════════════════════════════ */
function App(){

}
